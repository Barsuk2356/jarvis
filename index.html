<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARK INDUSTRIES | PIZZA OS</title>
    <!-- Подключаем шрифты, но добавили запасные на случай отсутствия сети -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --glow: #00d4ff;
            --dark: #050a10;
            --panel: rgba(0, 212, 255, 0.05);
            --border: 1px solid rgba(0, 212, 255, 0.3);
            --font-main: 'Roboto Mono', 'Courier New', monospace;
            --font-header: 'Orbitron', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--dark);
            color: var(--glow);
            font-family: var(--font-main);
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Эффект сканирующей полоски */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 212, 255, 0.2);
            opacity: 0.5;
            z-index: 1000;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100vh; } }

        header {
            padding: 50px 20px;
            text-align: center;
            border-bottom: 2px solid var(--glow);
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .logo {
            font-family: var(--font-header);
            font-size: 3rem;
            letter-spacing: 15px;
            text-shadow: 0 0 20px var(--glow);
            font-weight: 700;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 40px;
        }

        @media (max-width: 1024px) { .container { grid-template-columns: 1fr; } }

        .section-title {
            font-family: var(--font-header);
            font-size: 1.4rem;
            margin: 40px 0 25px;
            padding: 10px;
            background: rgba(0, 212, 255, 0.1);
            border-left: 5px solid var(--glow);
            clip-path: polygon(0 0, 95% 0, 100% 100%, 0 100%);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--panel);
            border: var(--border);
            position: relative;
            transition: 0.3s;
            overflow: hidden;
        }

        .card:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--glow);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.2);
            transform: translateY(-5px);
        }

        /* Контейнер картинки */
        .card-img-wrap {
            width: 100%;
            height: 220px;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: 0.5s;
        }

        .card:hover .card-img { opacity: 1; transform: scale(1.1); }

        .card-content { padding: 20px; }
        
        .card h3 { font-family: var(--font-header); font-size: 1.1rem; margin-bottom: 10px; color: #fff; }

        .price { font-size: 1.6rem; margin: 15px 0; color: var(--glow); font-family: var(--font-header); }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--glow);
            color: var(--glow);
            font-family: var(--font-header);
            cursor: pointer;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }

        .btn:hover { background: var(--glow); color: #000; box-shadow: 0 0 20px var(--glow); }

        /* Боковая панель (Корзина) */
        .sidebar {
            position: sticky;
            top: 20px;
            height: fit-content;
            background: rgba(0, 15, 30, 0.95);
            border: 1px solid var(--glow);
            padding: 30px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .cart-title { font-family: var(--font-header); font-size: 1.2rem; margin-bottom: 20px; border-bottom: 1px solid var(--glow); padding-bottom: 10px; }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            font-size: 0.9rem;
        }

        .remove {
            color: #ff4d4d;
            cursor: pointer;
            border: 1px solid #ff4d4d;
            padding: 2px 8px;
            font-size: 0.7rem;
            margin-left: 10px;
        }

        .total {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid var(--glow);
            background: rgba(0, 212, 255, 0.05);
            text-align: center;
        }

        .total span { font-size: 1.8rem; font-family: var(--font-header); display: block; color: #fff; }

        /* Форма заказа */
        #order-form { display: none; margin-top: 25px; }
        #order-form.active { display: block; }

        input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 15px;
            color: #fff;
            margin-bottom: 15px;
            font-family: var(--font-main);
        }

        input:focus { border-color: var(--glow); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }

        /* Модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center; align-items: center;
        }

        .modal-content {
            background: var(--dark);
            border: 2px solid var(--glow);
            padding: 60px;
            text-align: center;
            box-shadow: 0 0 100px var(--glow);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">STARK</div>
    <div style="font-size: 0.8rem; opacity: 0.6; margin-top: 10px; letter-spacing: 5px;">INTERFACE: PIZZA-OS v.9.0.1</div>
</header>

<div class="container">
    <main>
        <div class="section-title">CORE MENU: ПИЦЦА</div>
        <div class="grid" id="pizzas"></div>

        <div class="section-title">COOLING: НАПИТКИ</div>
        <div class="grid" id="drinks"></div>

        <div class="section-title">ENERGY: ДЕСЕРТЫ</div>
        <div class="grid" id="desserts"></div>
    </main>

    <aside>
        <div class="sidebar">
            <div class="cart-title">ACTIVE CARGO LOG</div>
            <div id="cart-list">
                <!-- Сюда падают товары -->
                <div style="opacity: 0.3; text-align: center; padding: 20px;">EMPTY_LOG_</div>
            </div>

            <div class="total">
                ИТОГО К ОПЛАТЕ:
                <span id="total-val">0 ₽</span>
            </div>

            <button class="btn" id="checkout-btn" style="margin-top: 20px; display: none;" onclick="showForm()">ОФОРМИТЬ ПОСТАВКУ</button>

            <form id="order-form" onsubmit="sendOrder(event)">
                <input type="text" id="user-name" placeholder="ID АГЕНТА (ИМЯ)" required>
                <input type="tel" id="user-phone" placeholder="КАНАЛ СВЯЗИ (ТЕЛ)" required>
                <input type="text" id="user-addr" placeholder="КООРДИНАТЫ (АДРЕС)" required>
                <button type="submit" class="btn">ИНИЦИИРОВАТЬ ПЕРЕДАЧУ</button>
            </form>
        </div>
    </aside>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h2 style="font-family: var(--font-header); font-size: 2rem; margin-bottom: 20px;">TRANSFER SUCCESS</h2>
        <p>Дроны Stark Industries вылетели по вашему адресу.</p>
        <button class="btn" style="margin-top: 40px; width: 200px; display: inline-block;" onclick="closeModal()">ЗАКРЫТЬ</button>
    </div>
</div>

<script>
    // База данных товаров. В Pepperoni вставлено твое фото (Base64)
    const db = {
        pizzas: [
            {id: 1, name: 'ПЕППЕРОНИ', price: 550, img: 'https://unsplash.com'},
            {id: 2, name: 'МАРГАРИТА', price: 450, img: 'https://unsplash.com'},
            {id: 3, name: 'ГАВАЙСКАЯ', price: 600, img: 'https://unsplash.com'},
            {id: 4, name: 'МЯСНАЯ', price: 650, img: 'https://unsplash.com'},
            {id: 5, name: '4 СЫРА', price: 580, img: 'https://unsplash.com'}
        ],
        drinks: [
            {id: 6, name: 'КОЛА', price: 100, img: 'https://unsplash.com'},
            {id: 7, name: 'СПРАЙТ', price: 100, img: 'https://unsplash.com'},
            {id: 8, name: 'ФАНТА', price: 100, img: 'https://unsplash.com'},
            {id: 9, name: 'СОК АПЕЛЬСИН', price: 120, img: 'https://unsplash.com'}
        ],
        desserts: [
            {id: 10, name: 'ЧИЗКЕЙК', price: 250, img: 'https://unsplash.com'},
            {id: 11, name: 'БРАУНИ', price: 200, img: 'https://unsplash.com'},
            {id: 12, name: 'ПАННА-КОТТА', price: 230, img: 'https://unsplash.com'}
        ]
    };

    let cart = JSON.parse(localStorage.getItem('stark_cart')) || [];

    // Инициализация
    function init() {
        render('pizzas', db.pizzas);
        render('drinks', db.drinks);
        render('desserts', db.desserts);
        updateCart();
    }

    function render(containerId, items) {
        const div = document.getElementById(containerId);
        div.innerHTML = items.map(i => `
            <div class="card">
                <div class="card-img-wrap">
                    <img src="${i.img}" class="card-img" alt="${i.name}" 
                         onerror="this.src='https://placeholder.com'">
                </div>
                <div class="card-content">
                    <h3>${i.name}</h3>
                    <div class="price">${i.price} ₽</div>
                    <button class="btn" onclick="addToCart(${i.id}, '${i.name}', ${i.price})">ЗАГРУЗИТЬ</button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id, name, price) {
        cart.push({ cartId: Date.now(), name, price });
        save();
        updateCart();
    }

    function removeFromCart(cartId) {
        cart = cart.filter(i => i.cartId !== cartId);
        save();
        updateCart();
    }

    function save() {
        localStorage.setItem('stark_cart', JSON.stringify(cart));
    }

    function updateCart() {
        const list = document.getElementById('cart-list');
        if (cart.length === 0) {
            list.innerHTML = `<div style="opacity: 0.3; text-align: center; padding: 20px;">EMPTY_LOG_</div>`;
            document.getElementById('checkout-btn').style.display = 'none';
        } else {
            list.innerHTML = cart.map(i => `
                <div class="cart-item">
                    <span>> ${i.name}</span>
                    <span>${i.price} ₽ <span class="remove" onclick="removeFromCart(${i.cartId})">DEL</span></span>
                </div>
            `).join('');
            document.getElementById('checkout-btn').style.display = 'block';
        }
        document.getElementById('total-val').innerText = cart.reduce((s, i) => s + i.price, 0) + ' ₽';
    }

    function showForm() {
        document.getElementById('order-form').classList.toggle('active');
    }

    function sendOrder(e) {
        e.preventDefault();
        document.getElementById('modal').style.display = 'flex';
        cart = [];
        save();
        updateCart();
        document.getElementById('order-form').classList.remove('active');
        e.target.reset();
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    init();
</script>

</body>
</html>
