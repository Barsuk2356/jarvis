<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пиццерия Джарвис</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 0;
        }
        
        .content {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: #111;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #00a8ff;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #00a8ff;
        }
        
        .logo-text {
            color: white;
            font-size: 1.3em;
            font-weight: bold;
        }
        
        .cart-info {
            background: #1a1a1a;
            padding: 8px 15px;
            border-radius: 5px;
            color: white;
            border: 1px solid #00a8ff;
        }
        
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .product-card {
            background: #111;
            border: 1px solid #00a8ff;
            border-radius: 5px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        
        .product-image {
            text-align: center;
            margin-bottom: 10px;
        }
        
        .product-image img {
            max-width: 60px;
            max-height: 60px;
        }
        
        .product-name {
            color: white;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .product-price {
            color: #00a8ff;
            font-size: 1.5em;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .product-desc {
            color: #ccc;
            font-size: 0.9em;
            margin-bottom: 10px;
            flex-grow: 1;
        }
        
        .add-btn {
            background: #111;
            border: 1px solid #00a8ff;
            color: #00a8ff;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 1em;
            margin-top: 10px;
        }
        
        .add-btn:hover {
            background: #00a8ff;
            color: black;
        }
        
        .cart {
            background: #111;
            border: 2px solid #00a8ff;
            border-radius: 5px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .cart h2 {
            color: #00a8ff;
            margin-bottom: 15px;
            border-bottom: 1px solid #00a8ff;
            padding-bottom: 10px;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #333;
            color: white;
        }
        
        .cart-item button {
            background: #330000;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 3px 8px;
            border-radius: 3px;
            cursor: pointer;
        }
        
        .cart-total {
            text-align: right;
            margin-top: 15px;
            font-size: 1.5em;
            color: #00a8ff;
        }
        
        .checkout-btn {
            background: #00a8ff;
            border: none;
            color: black;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .checkout-btn:hover {
            background: #0088cc;
        }
        
        .contacts {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
            color: white;
            text-align: center;
        }
        
        .contact-item {
            background: #111;
            border: 1px solid #00a8ff;
            padding: 10px;
            border-radius: 5px;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            color: #666;
            border-top: 1px solid #333;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #111;
            border: 3px solid #00a8ff;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 30px #00a8ff;
        }
        
        .modal-content h2 {
            color: #00a8ff;
            font-size: 2em;
            margin-bottom: 20px;
        }
        
        .modal-content p {
            color: white;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        
        .modal-content button {
            background: #00a8ff;
            border: none;
            color: black;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            cursor: pointer;
        }
        
        .modal-content .emoji {
            font-size: 4em;
            margin-bottom: 20px;
            display: block;
        }
        
        @media (max-width: 768px) {
            .products {
                grid-template-columns: 1fr;
            }
            .contacts {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="thankYouModal" class="modal">
        <div class="modal-content">
            <span class="emoji">🎉</span>
            <h2>Спасибо за заказ!</h2>
            <p>Благодарим вас, что выбрали нас!<br>Ожидайте ответа</p>
            <button onclick="closeModal()">Хорошо</button>
        </div>
    </div>

    <div class="content">
        <div class="header">
            <div class="logo">
                <img src="https://e.radikal.host/2026/03/16/1000090693.png" alt="JARVIS">
                <span class="logo-text">Пиццерия Джарвис</span>
            </div>
            <div class="cart-info">
                🛒 <span id="cart-count">0</span> шт
            </div>
        </div>

        <div class="products" id="all-products"></div>

        <div class="cart">
            <h2>🛒 Корзина</h2>
            <div id="cart-items"></div>
            <div class="cart-total" id="cart-total">💰 0 ₽</div>
            <button class="checkout-btn" onclick="checkout()">✅ Заказать</button>
        </div>

        <div class="contacts">
            <div class="contact-item">📞 +7 (999) 123-45-67</div>
            <div class="contact-item">📍 ул. Тверская, 15</div>
            <div class="contact-item">🕒 10:00 - 23:00</div>
        </div>

        <div class="footer">
            Пиццерия Джарвис © 2026
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "🍕 Пепперони", price: 550, desc: "Колбаса пепперони, сыр моцарелла, томатный соус" },
            { id: 2, name: "🍕 Маргарита", price: 450, desc: "Сыр моцарелла, томаты, базилик, оливковое масло" },
            { id: 3, name: "🍕 Гавайская", price: 600, desc: "Курица, ананас, сыр, соус" },
            { id: 4, name: "🍕 Мясная", price: 650, desc: "Бекон, ветчина, говядина, сыр, грибы" },
            { id: 5, name: "🍕 Четыре сыра", price: 580, desc: "Моцарелла, пармезан, горгонзола, фета" },
            { id: 6, name: "🥤 Кола", price: 100, desc: "Coca-Cola, 0.5л", img: "https://e.radikal.host/2026/03/16/1000090699.png" },
            { id: 7, name: "🥤 Спрайт", price: 100, desc: "Sprite, 0.5л", img: "https://e.radikal.host/2026/03/16/1000090697b824a5e40efc3ab2.png" },
            { id: 8, name: "🥤 Фанта", price: 100, desc: "Fanta, 0.5л", img: "https://e.radikal.host/2026/03/16/1000090701.png" },
            { id: 9, name: "🧃 Сок апельсиновый", price: 120, desc: "Апельсиновый, 0.3л" },
            { id: 10, name: "🍰 Чизкейк", price: 250, desc: "Нью-Йорк с ягодным соусом" },
            { id: 11, name: "🍫 Брауни", price: 200, desc: "Шоколадный с орехами" },
            { id: 12, name: "🍮 Панна-котта", price: 230, desc: "Ванильная с ягодным соусом" }
        ];

        let cart = JSON.parse(localStorage.getItem('cart')) || {};

        function renderProducts() {
            const container = document.getElementById('all-products');
            container.innerHTML = '';
            products.forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        ${p.img ? `<div class="product-image"><img src="${p.img}" alt="${p.name}"></div>` : ''}
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price} ₽</div>
                        <div class="product-desc">${p.desc}</div>
                        <button class="add-btn" onclick="addToCart(${p.id})">➕ Добавить</button>
                    </div>
                `;
            });
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            
            if (cart[id]) {
                cart[id].quantity += 1;
            } else {
                cart[id] = {
                    name: product.name,
                    price: product.price,
                    quantity: 1
                };
            }
            saveCart();
            updateCart();
        }

        function removeFromCart(id) {
            if (confirm('Удалить?')) {
                delete cart[id];
                saveCart();
                updateCart();
            }
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function updateCart() {
            const items = document.getElementById('cart-items');
            const totalSpan = document.getElementById('cart-total');
            const countSpan = document.getElementById('cart-count');
            
            let html = '';
            let total = 0;
            let count = 0;
            
            for (let id in cart) {
                const item = cart[id];
                total += item.price * item.quantity;
                count += item.quantity;
                html += `<div class="cart-item">
                    <span>${item.name} x${item.quantity}</span>
                    <span>${item.price * item.quantity} ₽
                        <button onclick="removeFromCart(${id})">✕</button>
                    </span>
                </div>`;
            }
            
            items.innerHTML = html || '<div style="text-align:center; padding:15px;">Пусто</div>';
            totalSpan.innerHTML = `💰 ${total} ₽`;
            countSpan.textContent = count;
        }

        function checkout() {
            if (Object.keys(cart).length === 0) {
                alert('Корзина пуста!');
                return;
            }
            document.getElementById('thankYouModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('thankYouModal').style.display = 'none';
            cart = {};
            saveCart();
            updateCart();
        }

        window.onclick = function(event) {
            const modal = document.getElementById('thankYouModal');
            if (event.target == modal) {
                modal.style.display = 'none';
                cart = {};
                saveCart();
                updateCart();
            }
        };

        renderProducts();
        updateCart();
    </script>
</body>
</html>
