<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS PIZZA SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-color: #00d4ff;
            --bg-dark: #020b14;
            --panel-bg: rgba(0, 212, 255, 0.05);
            --border-glow: 1px solid rgba(0, 212, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--glow-color);
            font-family: 'Roboto Mono', monospace;
            background-image: radial-gradient(circle at 50% 50%, #0a192f 0%, #020b14 100%);
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 30px 20px;
            border-bottom: var(--border-glow);
            background: rgba(0, 20, 40, 0.6);
        }

        .stark-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 8px;
            text-shadow: 0 0 15px var(--glow-color);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 350px; gap: 30px; }

        @media (max-width: 992px) { .container { grid-template-columns: 1fr; } }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            margin: 40px 0 20px;
            padding-left: 15px;
            border-left: 4px solid var(--glow-color);
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        .card {
            background: var(--panel-bg);
            border: var(--border-glow);
            border-radius: 2px;
            overflow: hidden;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .card:hover { 
            background: rgba(0, 212, 255, 0.1); 
            border-color: var(--glow-color);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: var(--border-glow);
            background: #111;
        }

        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }

        .price { font-size: 1.4rem; color: #fff; margin: 10px 0; font-family: 'Orbitron'; }

        button {
            background: transparent;
            border: 1px solid var(--glow-color);
            color: var(--glow-color);
            padding: 12px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            width: 100%;
            transition: 0.2s;
            text-transform: uppercase;
        }

        button:hover { background: var(--glow-color); color: #000; box-shadow: 0 0 15px var(--glow-color); }

        .cart-panel {
            background: rgba(0, 15, 30, 0.95);
            border: 1px solid var(--glow-color);
            padding: 25px;
            position: sticky;
            top: 20px;
        }

        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(0, 212, 255, 0.1); font-size: 0.85rem; }
        
        .remove-btn { width: auto; padding: 2px 8px; border-color: #ff3b3b; color: #ff3b3b; margin-left: 10px; font-size: 0.7rem; }

        .order-form { margin-top: 20px; display: none; }
        .order-form.active { display: block; }

        input {
            width: 100%;
            background: rgba(0, 30, 60, 0.4);
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: #fff;
            padding: 12px;
            margin-bottom: 10px;
            outline: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            border: 1px solid var(--glow-color);
            padding: 50px;
            text-align: center;
            background: #020b14;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
        }
    </style>
</head>
<body>

<header>
    <div class="stark-logo">STARK INDUSTRIES</div>
    <p style="font-size: 0.7rem; color: #555; margin-top: 5px;">INTERFACE v7.1 // JARVIS ONLINE</p>
</header>

<div class="container">
    <main>
        <div class="section-title">Пицца // Core Menu</div>
        <div class="grid" id="pizzas"></div>

        <div class="section-title">Напитки // Cooling Unit</div>
        <div class="grid" id="drinks"></div>

        <div class="section-title">Десерты // Energy Cells</div>
        <div class="grid" id="desserts"></div>
    </main>

    <aside>
        <div class="cart-panel">
            <h2 style="font-family: 'Orbitron'; margin-bottom: 15px; font-size: 1rem;">DATA LOG</h2>
            <div id="cart-items"></div>
            <div style="margin-top: 20px; padding: 15px; border: 1px solid var(--glow-color); text-align: right;">
                TOTAL: <span id="total-price" style="color: #fff; font-size: 1.4rem;">0</span> ₽
            </div>
            
            <div class="order-form" id="order-form">
                <input type="text" id="name" placeholder="AGENT ID">
                <input type="tel" id="phone" placeholder="COMMS">
                <input type="text" id="address" placeholder="COORDINATES">
                <button onclick="submitOrder()">INITIATE TRANSFER</button>
            </div>
            <button id="checkout-btn" style="margin-top: 15px;" onclick="toggleForm()">CHECKOUT</button>
        </div>
    </aside>
</div>

<div class="modal" id="thanks-modal">
    <div class="modal-content">
        <h2 style="font-family: 'Orbitron'; margin-bottom: 15px;">TRANSFERRED</h2>
        <p>Ваш заказ обрабатывается системой Stark.</p>
        <button onclick="closeModal()" style="margin-top: 20px; width: auto; padding: 10px 40px;">ВЫХОД</button>
    </div>
</div>

<script>
    const menu = {
        pizzas: [
            {id: 1, name: 'Пепперони', price: 550, img: 'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=400&h=300&fit=crop'},
            {id: 2, name: 'Маргарита', price: 450, img: 'https://images.unsplash.com/photo-1604068549290-dea0e4a305ca?w=400&h=300&fit=crop'},
            {id: 3, name: 'Гавайская', price: 600, img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400&h=300&fit=crop'},
            {id: 4, name: 'Мясная', price: 650, img: 'https://images.unsplash.com/photo-1590947132387-155cc02f3212?w=400&h=300&fit=crop'},
            {id: 5, name: 'Четыре сыра', price: 580, img: 'https://images.unsplash.com/photo-1528137871618-79d2761e3fd5?w=400&h=300&fit=crop'}
        ],
        drinks: [
            {id: 6, name: 'Кола', price: 100, img: 'https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400&h=300&fit=crop'},
            {id: 7, name: 'Спрайт', price: 100, img: 'https://images.unsplash.com/photo-1625772299848-391b6a87d7b3?w=400&h=300&fit=crop'},
            {id: 8, name: 'Фанта', price: 100, img: 'https://images.unsplash.com/photo-1625772452859-3c03d5a1be5c?w=400&h=300&fit=crop'},
            {id: 9, name: 'Сок апельсин.', price: 120, img: 'https://images.unsplash.com/photo-1600271886742-f049cd451bba?w=400&h=300&fit=crop'}
        ],
        desserts: [
            {id: 10, name: 'Чизкейк', price: 250, img: 'https://images.unsplash.com/photo-1533134242443-d4fd215305ad?w=400&h=300&fit=crop'},
            {id: 11, name: 'Брауни', price: 200, img: 'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=400&h=300&fit=crop'},
            {id: 12, name: 'Панна-котта', price: 230, img: 'https://images.unsplash.com/photo-1488477181946-6428a0291777?w=400&h=300&fit=crop'}
        ]
    };

    let cart = JSON.parse(localStorage.getItem('jarvis_cart')) || [];

    function init() {
        renderCategory('pizzas', menu.pizzas);
        renderCategory('drinks', menu.drinks);
        renderCategory('desserts', menu.desserts);
        updateCartUI();
    }

    function renderCategory(containerId, items) {
        const container = document.getElementById(containerId);
        container.innerHTML = items.map(item => `
            <div class="card">
                <img src="${item.img}" class="card-img" alt="${item.name}" loading="lazy" onerror="this.style.display='none'">
                <div class="card-content">
                    <h3>${item.name}</h3>
                    <div class="price">${item.price} ₽</div>
                    <button onclick="addToCart(${item.id}, '${item.name}', ${item.price})">ADD TO LIST</button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id, name, price) {
        cart.push({ cartId: Date.now() + id, name, price });
        localStorage.setItem('jarvis_cart', JSON.stringify(cart));
        updateCartUI();
    }

    function removeFromCart(cartId) {
        cart = cart.filter(item => item.cartId !== cartId);
        localStorage.setItem('jarvis_cart', JSON.stringify(cart));
        updateCartUI();
    }

    function updateCartUI() {
        const list = document.getElementById('cart-items');
        list.innerHTML = cart.map(item => `
            <div class="cart-item">
                <span>>> ${item.name}</span>
                <span>${item.price} ₽ <button class="remove-btn" onclick="removeFromCart(${item.cartId})">X</button></span>
            </div>
        `).join('');
        document.getElementById('total-price').innerText = cart.reduce((s, i) => s + i.price, 0);
        const checkoutBtn = document.getElementById('checkout-btn');
        if (checkoutBtn) checkoutBtn.style.display = cart.length > 0 ? 'block' : 'none';
    }

    function toggleForm() {
        if (cart.length === 0) return;
        document.getElementById('order-form').classList.toggle('active');
        document.getElementById('checkout-btn').style.display = 'none';
    }

    function submitOrder() {
        const name = document.getElementById('name').value;
        if(!name) return alert('Auth Required!');
        
        let message = `🚨 НОВЫЙ ЗАКАЗ!\n👤 Имя: ${name}\n📞 Телефон: ${document.getElementById('phone').value}\n📍 Адрес: ${document.getElementById('address').value}\n\n📦 Заказ:\n`;
        let total = 0;
        cart.forEach(item => {
            message += `• ${item.name} — 1 шт × ${item.price} ₽ = ${item.price} ₽\n`;
            total += item.price;
        });
        message += `\n💰 ИТОГО: ${total} ₽`;
        
        const BOT_TOKEN = '8211100252:AAGkEDqdHJDK_3GvihoDVycnbJAjmcRJ1nY';
        const CHAT_ID = 5382774705;
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`;
        
        fetch(url).catch(() => console.log('Ошибка отправки, но заказ принят'));
        
        document.getElementById('thanks-modal').style.display = 'flex';
        cart = [];
        localStorage.removeItem('jarvis_cart');
        updateCartUI();
        document.getElementById('order-form').classList.remove('active');
        document.getElementById('name').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('address').value = '';
    }

    function closeModal() {
        document.getElementById('thanks-modal').style.display = 'none';
    }

    init();
</script>

</body>
</html>
